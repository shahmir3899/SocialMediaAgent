[alembic]
script_location = alembic
prepend_sys_path = .
# NOTE: This URL is overridden at runtime by alembic/env.py which reads
# DATABASE_URL_SYNC from your .env file. You do NOT need to edit this line.
# It is only used if you run alembic outside of the normal Python path.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/social_media_agent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

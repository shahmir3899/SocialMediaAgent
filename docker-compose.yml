services:
  # ── Nginx reverse-proxy + Let's Encrypt TLS ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renew certificates — run manually or via cron:
    #   docker compose run --rm certbot renew
    entrypoint: ""
    command: "true"

  # ── Application ──
  app:
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    expose:
      - "8000"
    depends_on:
      - db
      - redis

  celery-worker:
    build: .
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info -P solo
    env_file: .env
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis

  # ── Data stores (internal only, no published ports) ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: social_media_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"

volumes:
  pgdata:
  certbot-www:
  certbot-certs:
